<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ghost Water Detector - Real-time water network monitoring dashboard">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Ghost Water Detector - Dashboard</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/static/css/styles.css?v=2">
</head>
<body>
    <div class="header-bar">
        <div class="logo-area">
            <h1>Ghost Water Detector</h1>
            <span class="ws-indicator ws-disconnected" id="wsIndicator" title="WebSocket status"></span>
        </div>
        <div class="user-area">
            <span class="role-badge" id="roleBadge">--</span>
            <span id="userName" style="color: var(--text-secondary); font-size: 14px;">--</span>
            <button id="crewKeysBtn" style="display:none;" onclick="toggleCrewManager()">Crew Keys</button>
            <button id="logoutBtn">Logout</button>
        </div>
    </div>
    <div class="main-layout">
        <div class="sidebar-container" id="sidebar-container"></div>
        <div class="content-area" id="main-content"></div>
    </div>
    <div class="overlay-backdrop" id="dispatch-modal-overlay"></div>
    <div class="overlay-backdrop" id="crew-manager-overlay"></div>
    <div id="toast-container"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <script src="/static/js/auth.js?v=2"></script>
    <script src="/static/js/kpi.js?v=2"></script>
    <script src="/static/js/anomalyList.js?v=2"></script>
    <script src="/static/js/map.js?v=2"></script>
    <script src="/static/js/dispatch.js?v=2"></script>
    <script src="/static/js/analystView.js?v=2"></script>
    <script src="/static/js/crewManager.js?v=2"></script>
    <script src="/static/js/app.js?v=2"></script>
</body>
</html>
