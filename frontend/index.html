<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Ghost Water Detector - Real-time water network anomaly detection system for Ahmedabad Municipal Corporation">
    <title>Ghost Water Detector - Login</title>
    <link rel="stylesheet" href="/static/css/styles.css">
</head>
<body>
    <div id="login-container"></div>
    <script src="/static/js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', function() {
            if (getToken()) {
                window.location.href = '/dashboard';
                return;
            }
            fetch('/stitch-components/login-screen.html')
                .then(function(r) { return r.text(); })
                .then(function(html) {
                    document.getElementById('login-container').innerHTML = html;
                    initLoginForm();
                });
        });
    </script>
</body>
</html>
