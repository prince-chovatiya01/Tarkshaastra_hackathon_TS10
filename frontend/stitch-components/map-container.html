<div class="map-wrapper">
    <style>
        .map-wrapper {
            width: 100%;
            height: 100%;
            position: relative;
        }
        #leaflet-map {
            width: 100%;
            height: 100%;
            background: #0a0a0f;
        }
        .map-legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            z-index: 500;
            background: rgba(20, 20, 30, 0.92);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            padding: 14px 18px;
            min-width: 160px;
        }
        .map-legend-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 9px;
            font-weight: 700;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 10px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 6px;
            font-family: 'Rajdhani', sans-serif;
            font-size: 12px;
            color: rgba(255,255,255,0.7);
        }
        .legend-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .map-layer-toggle {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 500;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .layer-btn {
            padding: 6px 14px;
            background: rgba(20,20,30,0.9);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 6px;
            color: rgba(255,255,255,0.6);
            font-family: 'Rajdhani', sans-serif;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .layer-btn:hover { border-color: #00f3ff; color: #00f3ff; }
        .dark-popup .leaflet-popup-content-wrapper {
            background: rgba(20,20,30,0.95);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 8px;
            color: #fff;
        }
        .dark-popup .leaflet-popup-tip { background: rgba(20,20,30,0.95); }
        .zone-tooltip {
            background: rgba(20,20,30,0.9) !important;
            border: 1px solid rgba(0,243,255,0.3) !important;
            color: #fff !important;
            font-family: 'Rajdhani', sans-serif !important;
            border-radius: 4px !important;
        }
        .anomaly-marker-icon {
            background: none !important;
            border: none !important;
        }
        .anomaly-pin {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 12px;
            border: 2px solid rgba(255,255,255,0.3);
            transition: all 0.3s ease;
        }
        .anomaly-pin:hover {
            transform: scale(1.3);
        }
    </style>
    <div id="leaflet-map"></div>
    <div class="map-layer-toggle">
        <button class="layer-btn" id="togglePipesBtn" style="border-color:#00f3ff;">Pipes</button>
    </div>
    <div class="map-legend">
        <div class="map-legend-title">Anomalies</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ff3333;"></div>Pipe Burst</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffaa00;"></div>Illegal Tap</div>
        <div class="legend-item"><div class="legend-dot" style="background:#22d3ee;"></div>Slow Seepage</div>
        <div class="legend-item"><div class="legend-dot" style="background:#22c55e;"></div>Resolved</div>
        <div class="map-legend-title" style="margin-top:10px;border-top:1px solid rgba(255,255,255,0.08);padding-top:10px;">Pipe Zones</div>
        <div class="legend-item"><div class="legend-dot" style="background:#00f3ff;"></div>Zone A</div>
        <div class="legend-item"><div class="legend-dot" style="background:#a855f7;"></div>Zone B</div>
        <div class="legend-item"><div class="legend-dot" style="background:#ffaa00; opacity:0.7;"></div>Zone C</div>
    </div>
</div>
